name: PhotoCensus
options:
  bundleIdPrefix: com.monodera
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
targets:
  PhotoCensus:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "1"
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.photography
        NSPhotoLibraryUsageDescription: "Reads your Photos library to count photos and total size per day."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monodera.PhotoCensus
        MARKETING_VERSION: "0.1.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
  PhotoCensusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - Sources/Models.swift
      - Sources/Formatters.swift
      - Sources/DailyAggregator.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PhotoCensus:
    build:
      targets:
        PhotoCensus: all
        PhotoCensusTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PhotoCensusTests
